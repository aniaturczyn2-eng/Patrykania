<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ania ❤️ Patric</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(180deg,#ffd1e8,#ffc0cb,#ffe4ef);
}

.page{
    width:100vw;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position:absolute;
    left:0;
    top:0;
}

.active{
    display:flex;
}

h1{
    font-size:70px;
    color:white;
    text-shadow:3px 3px 10px hotpink;
    z-index:5;
}

button{
    margin-top:40px;
    padding:18px 45px;
    border:none;
    border-radius:40px;
    background:#ff4fa2;
    color:white;
    font-size:24px;
    cursor:pointer;
    transition:.3s;
    z-index:5;
}

button:hover{
    transform:scale(1.1);
}

.heart{
    position:absolute;
    top:-50px;
    color:#ff3d8b;
    animation:fall linear infinite;
    user-select:none;
}

@keyframes fall{

0%{
transform:translateY(-50px);
}

100%{
transform:translateY(110vh);
}

}
.rebus{

font-size:50px;

background:white;

padding:30px;

border-radius:30px;

margin:30px;

color:#ff4fa2;

box-shadow:0 0 20px pink;

}


input{

padding:15px;

font-size:20px;

border-radius:20px;

border:none;

text-align:center;

}


#box{

font-size:120px;

cursor:pointer;

transition:1s;

margin:40px;

}


#box:hover{

transform:scale(1.1);

}

</style>

</head>
<body>

<div class="page active" id="page1">

<h1>Ania ❤️ Patric</h1>

<button onclick="nextPage()">
Rozpocznij ❤️
</button>

</div>
<div class="page" id="page2">

<h1 style="font-size:45px;">TEST WIEDZY ❤️</h1>

<div id="quizBox">

<h2 id="question"></h2>

<div id="answers"></div>

<p id="result"></p>

</div>

</div>
<div class="page" id="page3">

<h1 style="font-size:45px;">
ŁAP SERDUSZKA ❤️
</h1>

<h2 id="score">
0 / 20
</h2>

<div id="gameArea"></div>

</div>

<div class="page" id="page4">

<h1 style="font-size:45px;">
🧩 ZAGADKA 🧩
</h1>

<h2>
Co teraz robię? 😏
</h2>

<div class="rebus">

<div>
⌨️ TIK
</div>

<div>
➕
</div>

<div>
⏰ TOK
</div>

</div>


<input 
id="answer"
placeholder="Wpisz odpowiedź">


<button onclick="checkRebus()">
Sprawdź ❤️
</button>


<p id="rebusResult"></p>


</div>

<div class="page" id="page5">

<h1 style="font-size:45px;">
🎁 Mam coś dla Ciebie...
</h1>


<div id="box" onclick="openBox()">
📦
</div>


<p id="boxText"></p>


</div>
<div class="page" id="page6">

<h1 style="font-size:45px;">
Mam ważne pytanie...
</h1>


<h2>
Czy zostaniesz moim chłopakiem? ❤️
</h2>


<div>

<button onclick="yesAnswer()">
TAK ❤️
</button>


<button id="noButton">
NIE 😈
</button>

</div>


<h2 id="finalText"></h2>


</div>



<script>


const page1=document.getElementById("page1");
const page2=document.getElementById("page2");


for(let i=0;i<70;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*35)+"px";

heart.style.animationDuration=(4+Math.random()*5)+"s";

heart.style.animationDelay=Math.random()*5+"s";

page1.appendChild(heart);

}


function nextPage(){

page1.classList.remove("active");
page2.classList.add("active");

startQuiz();

}



let questions=[

{
q:"Kiedy było nasze pierwsze spotkanie?",
answers:[
"20 września 2023",
"21 września 2023",
"22 września 2023"
],
correct:0
},

{
q:"Gdzie pierwszy raz trzymaliśmy się za ręce?",
answers:[
"Cmentarz",
"Pokój Ani",
"Park na Dąbrowskiego"
],
correct:0
},

{
q:"Kto pierwszy napisał?",
answers:[
"Ania",
"Patric"
],
correct:0
},

{
q:"Ile centymetrów ma Ania?",
answers:[
"160 cm",
"163 cm",
"164 cm",
"165 cm"
],
correct:2
},

{
q:"Czy mnie lubisz? ❤️",
answers:[
"TAK ❤️",
"NIE 😈"
],
correct:0
}

];


let current=0;


function startQuiz(){

showQuestion();

}



function showQuestion(){

let q=document.getElementById("question");

let answers=document.getElementById("answers");

let result=document.getElementById("result");


result.innerHTML="";

q.innerHTML=questions[current].q;

answers.innerHTML="";


questions[current].answers.forEach((answer,index)=>{


let btn=document.createElement("button");

btn.innerHTML=answer;


btn.onclick=function(){


if(index===questions[current].correct){

result.innerHTML="✅ Dobra odpowiedź! ❤️";


setTimeout(()=>{

current++;


if(current<questions.length){

showQuestion();

}
else{

page2.classList.remove("active");
page3.classList.add("active");

startGame();

}

},1000);


}

else{

result.innerHTML="❌ Zła odpowiedź 😢 Spróbuj jeszcze raz";

}


};


answers.appendChild(btn);


});


}




const page3=document.getElementById("page3");

let score=0;


function startGame(){

score=0;

document.getElementById("score").innerHTML="0 / 20";


let timer=setInterval(()=>{


let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="absolute";

heart.style.left=Math.random()*90+"%";

heart.style.top=Math.random()*70+"%";

heart.style.fontSize="45px";

heart.style.cursor="pointer";


heart.onclick=function(){

score++;

document.getElementById("score").innerHTML=
score+" / 20";

heart.remove();


if(score>=20){

clearInterval(timer);

page3.classList.remove("active");

page4.classList.add("active");

}

};


document.getElementById("gameArea")
.appendChild(heart);


},500);


}

const page4=document.getElementById("page4");


function checkRebus(){

let answer=document
.getElementById("answer")
.value
.toLowerCase()
.trim();


let result=document.getElementById("rebusResult");


if(answer==="tiktok"){

result.innerHTML="✅ Dobrze! ❤️";

setTimeout(()=>{

page4.classList.remove("active");

page5.classList.add("active");

},1500);

}

else{

result.innerHTML="❌ Spróbuj jeszcze raz 😄";

}


}

const page5=document.getElementById("page5");


function openBox(){

let box=document.getElementById("box");

box.innerHTML="💖";

box.style.transform="scale(1.5) rotate(10deg)";


document.getElementById("boxText").innerHTML=
"✨ Otworzyłaś tajemniczą szkatułkę ✨";


setTimeout(()=>{


page5.classList.remove("active");

page6.classList.add("active");


},2500);


}
const page6=document.getElementById("page6");


function yesAnswer(){

document.getElementById("finalText").innerHTML=
"🎉❤️ SUPER ❤️🎉<br><br>";


createConfetti();

}



let no=document.getElementById("noButton");


no.addEventListener("mouseover",function(){

no.style.position="absolute";

no.style.left=Math.random()*80+"vw";

no.style.top=Math.random()*80+"vh";

});


no.addEventListener("click",function(){

alert("❌ Zła odpowiedź! Spróbuj jeszcze raz 😈");

});



function createConfetti(){


for(let i=0;i<100;i++){


let c=document.createElement("div");

c.innerHTML="❤️";

c.style.position="fixed";

c.style.left=Math.random()*100+"vw";

c.style.top="-20px";

c.style.fontSize="30px";

c.style.animation="fall 3s linear";


document.body.appendChild(c);


setTimeout(()=>{

c.remove();

},3000);


}


}

</script>

</body>
</html>
